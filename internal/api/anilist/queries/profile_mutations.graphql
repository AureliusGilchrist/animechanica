# Mutation to update user profile information
mutation UpdateUser($about: String, $avatar: String, $bannerImage: String) {
    UpdateUser(about: $about, avatar: $avatar, bannerImage: $bannerImage) {
        id
        name
        about
        avatar {
            large
            medium
        }
        bannerImage
    }
}

# Mutation to toggle anime favorite
mutation ToggleFavouriteAnime($animeId: Int!) {
    ToggleFavourite(animeId: $animeId) {
        anime {
            nodes {
                id
                title {
                    userPreferred
                }
            }
        }
    }
}

