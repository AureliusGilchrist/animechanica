query CharacterDetails($id: Int!) {
  Character(id: $id) {
    id
    name {
      full
      native
      alternative
    }
    image {
      large
      medium
    }
    description
    gender
    dateOfBirth {
      year
      month
      day
    }
    age
    bloodType
    isFavourite
    isFavouriteBlocked
    siteUrl
    favourites
    media(page: 1, perPage: 50, sort: [POPULARITY_DESC, SCORE_DESC]) {
      pageInfo {
        total
        currentPage
        lastPage
        hasNextPage
        perPage
      }
      edges {
        id
        role
        node {
          id
          title {
            romaji
            english
            native
          }
          type
          format
          status
          description
          startDate {
            year
            month
            day
          }
          endDate {
            year
            month
            day
          }
          season
          seasonYear
          episodes
          chapters
          volumes
          duration
          countryOfOrigin
          isLicensed
          source
          hashtag
          trailer {
            id
            site
            thumbnail
          }
          updatedAt
          coverImage {
            extraLarge
            large
            medium
            color
          }
          bannerImage
          genres
          synonyms
          averageScore
          meanScore
          popularity
          isLocked
          trending
          favourites
          tags {
            id
            name
            description
            category
            rank
            isGeneralSpoiler
            isMediaSpoiler
            isAdult
            userId
          }
          relations {
            edges {
              id
              relationType
              node {
                id
                title {
                  romaji
                  english
                  native
                }
                format
                type
                status
                coverImage {
                  extraLarge
                  large
                  medium
                  color
                }
              }
            }
          }
          studios {
            edges {
              id
              isMain
              node {
                id
                name
                isAnimationStudio
                siteUrl
              }
            }
          }
          isAdult
          nextAiringEpisode {
            id
            airingAt
            timeUntilAiring
            episode
          }
          airingSchedule {
            edges {
              id
              node {
                id
                airingAt
                timeUntilAiring
                episode
              }
            }
          }
          externalLinks {
            id
            url
            site
            siteId
            type
            language
            color
            icon
          }
          streamingEpisodes {
            title
            thumbnail
            url
            site
          }
          rankings {
            id
            rank
            type
            format
            year
            season
            allTime
            context
          }
          mediaListEntry {
            id
            status
            score
            progress
            progressVolumes
            repeat
            priority
            private
            notes
            hiddenFromStatusLists
            customLists
            advancedScores
            startedAt {
              year
              month
              day
            }
            completedAt {
              year
              month
              day
            }
            updatedAt
            createdAt
          }
          stats {
            scoreDistribution {
              score
              amount
            }
            statusDistribution {
              status
              amount
            }
          }
          siteUrl
          autoCreateForumThread
          isRecommendationBlocked
          isReviewBlocked
          modNotes
        }
      }
    }
  }
}
